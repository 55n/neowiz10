<!doctype html>
<html lang="ko">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>두더지 생존 - Phaser</title>
		<style>
			html,
			body {
				margin: 0;
				padding: 0;
				width: 100%;
				height: 100%;
				background: #080400;
				overflow: hidden;
			}

			body {
				display: flex;
				align-items: center;
				justify-content: center;
				font-family: monospace;
			}

			#game {
				width: min(96vw, 960px);
				aspect-ratio: 4 / 3;
			}

			canvas {
				display: block;
				border-radius: 12px;
				box-shadow: 0 0 20px rgba(0, 0, 0, 0.35);
			}
		</style>
	</head>
	<body>
		<div id="game"></div>
		<script src="https://cdn.jsdelivr.net/npm/phaser@v4.2.0/dist/phaser.min.js"></script>
		<script>
			class GameScene extends Phaser.Scene {
				constructor() {
					super({ key: "GameScene" });
					this.cols = 9;
					this.rows = 18;
					this.tileSize = 46;
					this.originX = 110;
					this.originY = 80;
					this.board = [];
					this.player = null;
					this.playerSprite = null;
					this.threatLine = null;
					this.threatGlow = null;
					this.threatProgress = -2.5;
					this.maxDepth = 0;
					this.gameOver = false;
					this.won = false;
				}

				create() {
					this.cameras.main.setBackgroundColor("#0e0700");

					this.add
						.text(this.originX, 20, "두더지 생존", {
							fontFamily: "monospace",
							fontSize: "28px",
							color: "#e2b36a",
							fontStyle: "bold",
						})
						.setOrigin(0);

					this.hud = this.add
						.text(this.originX, 52, "", {
							fontFamily: "monospace",
							fontSize: "16px",
							color: "#d8c09c",
							lineSpacing: 6,
						})
						.setOrigin(0);

					this.createBoard();
					this.createThreat();
					this.createInput();
					this.updateHud();
				}

				createBoard() {
					for (let r = 0; r < this.rows; r++) {
						this.board[r] = [];
						for (let c = 0; c < this.cols; c++) {
							const hardChance = 0.16 + (r / this.rows) * 0.22;
							const isHard = Math.random() < hardChance;
							const tile = this.add.rectangle(
								this.originX +
									c * this.tileSize +
									this.tileSize / 2,
								this.originY +
									r * this.tileSize +
									this.tileSize / 2,
								this.tileSize - 4,
								this.tileSize - 4,
								isHard ? 0x2b2433 : 0x7a4f1a,
							);
							tile.setStrokeStyle(1, 0x000000, 0.5);
							tile.setOrigin(0.5);
							this.board[r][c] = {
								rect: tile,
								type: isHard ? 1 : 0,
								hits: 0,
								flash: 0,
							};
						}
					}

					const startCol = Math.floor(this.cols / 2);
					this.board[0][startCol].type = 0;
					this.board[0][startCol].hits = 2;
					this.board[0][startCol].rect.setFillStyle(0x5f3511);

					this.player = { row: 0, col: startCol };
					this.playerSprite = this.add.circle(
						this.originX +
							startCol * this.tileSize +
							this.tileSize / 2,
						this.originY + this.tileSize / 2,
						13,
						0xc8a060,
					);
					this.playerSprite.setStrokeStyle(2, 0x8b5a2b);
					this.playerSprite.setDepth(5);

					this.tweens.add({
						targets: this.playerSprite,
						scale: 1.08,
						duration: 500,
						yoyo: true,
						repeat: -1,
					});
				}

				createThreat() {
					this.threatGlow = this.add.rectangle(
						this.originX,
						this.originY - 20,
						this.cols * this.tileSize,
						28,
						0xff8c00,
						0.22,
					);
					this.threatLine = this.add.rectangle(
						this.originX,
						this.originY - 20,
						this.cols * this.tileSize,
						8,
						0xff5500,
					);
					this.threatGlow.setOrigin(0, 0.5);
					this.threatLine.setOrigin(0, 0.5);
					this.threatGlow.setDepth(3);
					this.threatLine.setDepth(4);
				}

				createInput() {
					this.input.keyboard.on("keydown-LEFT", () =>
						this.tryMove(-1),
					);
					this.input.keyboard.on("keydown-A", () => this.tryMove(-1));
					this.input.keyboard.on("keydown-RIGHT", () =>
						this.tryMove(1),
					);
					this.input.keyboard.on("keydown-D", () => this.tryMove(1));
					this.input.keyboard.on("keydown-R", () =>
						this.scene.restart(),
					);

					this.input.on("pointerdown", (pointer) => {
						if (pointer.x < this.scale.gameSize.width / 2) {
							this.tryMove(-1);
						} else {
							this.tryMove(1);
						}
					});
				}

				tryMove(dir) {
					if (this.gameOver) return;

					const nextRow = this.player.row + 1;
					const nextCol = this.player.col + dir;

					if (nextCol < 0 || nextCol >= this.cols) return;
					if (!this.board[nextRow]) return;

					const tile = this.board[nextRow][nextCol];
					if (tile.type === 1) {
						tile.flash = 8;
						this.updateTileVisual(tile);
						return;
					}

					tile.hits += 1;
					if (tile.hits >= 2) {
						this.player.row = nextRow;
						this.player.col = nextCol;
						this.maxDepth = Math.max(
							this.maxDepth,
							this.player.row,
						);
						this.movePlayerToTile();
					}

					this.updateTileVisual(tile);
				}

				movePlayerToTile() {
					const tile =
						this.board[this.player.row][this.player.col].rect;
					this.tweens.add({
						targets: this.playerSprite,
						x: tile.x,
						y: tile.y,
						duration: 180,
						ease: "Sine.easeOut",
					});
				}

				updateTileVisual(tile) {
					if (tile.flash > 0) {
						tile.rect.setFillStyle(0xff5500);
						tile.rect.setAlpha(0.7);
						return;
					}

					if (tile.hits >= 2) {
						tile.rect.setFillStyle(0x0e0700);
						tile.rect.setAlpha(0.18);
					} else if (tile.type === 0) {
						tile.rect.setFillStyle(
							tile.hits === 1 ? 0x5a3810 : 0x7a4f1a,
						);
					} else {
						tile.rect.setFillStyle(0x2b2433);
					}
				}

				update(time, delta) {
					if (this.gameOver) return;

					const speed = 0.024 + (this.maxDepth / this.rows) * 0.04;
					this.threatProgress += delta * speed * 0.04;
					const threatY =
						this.originY - 20 + this.threatProgress * this.tileSize;

					this.threatGlow.y = threatY;
					this.threatLine.y = threatY;

					this.board.forEach((row) => {
						row.forEach((tile) => {
							if (tile.flash > 0) {
								tile.flash -= 1;
								if (tile.flash <= 0) {
									this.updateTileVisual(tile);
								}
							}
						});
					});

					const distance = this.player.row - this.threatProgress;
					if (distance <= 0) {
						this.endGame(false);
						return;
					}

					if (this.player.row >= this.rows - 1) {
						this.endGame(true);
					}

					this.updateHud();
				}

				updateHud() {
					const distance = this.player.row - this.threatProgress;
					const text = [
						`깊이 ${this.player.row} / ${this.rows - 1}`,
						`위협 ${distance.toFixed(1)}칸`,
						`방향키 / A D 로 이동`,
						`R = 재시작`,
					].join("\n");
					this.hud.setText(text);
				}

				endGame(success) {
					this.gameOver = true;
					this.won = success;

					const overlay = this.add.rectangle(
						this.originX - 20,
						this.originY - 20,
						this.cols * this.tileSize + 40,
						this.rows * this.tileSize + 80,
						0x000000,
						0.65,
					);
					overlay.setOrigin(0, 0);
					overlay.setDepth(20);

					const message = success ? "승리!" : "위협에 잡혔습니다";
					const label = this.add.text(
						this.originX + (this.cols * this.tileSize) / 2,
						this.originY + this.tileSize * 4,
						message,
						{
							fontFamily: "monospace",
							fontSize: "30px",
							color: success ? "#8eff8f" : "#ff8c6b",
							fontStyle: "bold",
						},
					);
					label.setOrigin(0.5, 0.5);
					label.setDepth(21);

					const retry = this.add.text(
						this.originX + (this.cols * this.tileSize) / 2,
						this.originY + this.tileSize * 5.3,
						"R 키로 다시 시작",
						{
							fontFamily: "monospace",
							fontSize: "18px",
							color: "#f5e5c1",
						},
					);
					retry.setOrigin(0.5, 0.5);
					retry.setDepth(21);
				}
			}

			const config = {
				type: Phaser.AUTO,
				width: 900,
				height: 640,
				parent: "game",
				backgroundColor: "#0e0700",
				scene: [GameScene],
				scale: {
					mode: Phaser.Scale.FIT,
					autoCenter: Phaser.Scale.CENTER_BOTH,
				},
			};

			new Phaser.Game(config);
		</script>
	</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>두더지: 운석의 날</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #050302; }
  body {
    font-family: 'Pretendard', -apple-system, system-ui, 'Malgun Gothic', monospace;
    user-select: none; -webkit-user-select: none; -webkit-tap-highlight-color: transparent;
    touch-action: none;
  }
  #app { position: fixed; inset: 0; }
  canvas { display: block; }
  .hidden { display: none !important; }

  /* ── 터치 입력 영역 ── */
  .touchzone { position: fixed; top: 0; bottom: 0; width: 50%; z-index: 5; }
  #zoneL { left: 0; }
  #zoneR { right: 0; }

  /* ── HUD ── */
  #hud {
    position: fixed; top: 0; left: 0; right: 0; z-index: 10;
    display: flex; justify-content: space-between; align-items: flex-start;
    padding: 14px 18px; pointer-events: none;
    color: #b89060; font-size: 14px; letter-spacing: 0.03em;
    text-shadow: 0 1px 3px #000;
  }
  #hud .depth { font-weight: 700; }
  #hud .dist { text-align: right; color: #6b5540; transition: color .15s; }
  #hud .dist.danger { color: #ff5022; }
  #countdown {
    position: fixed; top: 16%; left: 0; right: 0; z-index: 10; text-align: center;
    pointer-events: none; color: #e8e0d0; text-shadow: 0 2px 8px #000;
  }
  #countdown .lbl { font-size: 15px; letter-spacing: 0.1em; opacity: .8; }
  #countdown .num { font-size: 64px; font-weight: 800; color: #ffcf60; line-height: 1.1; }

  /* ── 오버레이 ── */
  .overlay {
    position: fixed; inset: 0; z-index: 20;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; color: #d8c8b0; padding: 24px;
    background: radial-gradient(ellipse at center, rgba(8,4,2,.72), rgba(3,1,0,.94));
  }
  .overlay.hidden { display: none; }
  .overlay h1 { font-size: clamp(30px, 8vw, 58px); font-weight: 800; color: #e6c074;
    letter-spacing: 0.04em; margin-bottom: 6px; text-shadow: 0 3px 16px rgba(255,140,0,.25); }
  .overlay .sub { font-size: clamp(13px, 3.6vw, 17px); color: #9a8158; max-width: 30ch;
    line-height: 1.7; margin-bottom: 30px; }
  .overlay .go {
    font-size: clamp(14px, 3.8vw, 18px); color: #07150a; font-weight: 700;
    background: #e6c074; padding: 13px 30px; border-radius: 999px;
    box-shadow: 0 6px 22px rgba(230,192,116,.25); animation: pulse 1.8s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{transform:scale(1);opacity:.92} 50%{transform:scale(1.05);opacity:1} }
  .overlay .epi { color: #b0a486; font-size: clamp(13px, 3.4vw, 16px); line-height: 2; margin: 14px 0 26px; }
  .overlay .epi .em { color: #e6c074; }
  .overlay .small { font-size: 12px; color: #6a5a44; margin-top: 22px; letter-spacing: .05em; }
  .overlay h1.lose { color: #ff5022; text-shadow: 0 3px 16px rgba(255,40,0,.3); }

  /* ── 임팩트 플래시 ── */
  #flash { position: fixed; inset: 0; z-index: 30; background: #fff; opacity: 0;
    pointer-events: none; transition: opacity .5s ease-out; }

  /* ── 안내 ── */
  #hint { position: fixed; bottom: 12px; left: 0; right: 0; z-index: 10; text-align: center;
    color: #4a3d2c; font-size: 11px; letter-spacing: .06em; pointer-events: none; }
</style>
</head>
<body>
<div id="app"></div>

<div class="touchzone" id="zoneL"></div>
<div class="touchzone" id="zoneR"></div>

<div id="hud">
  <div class="depth">깊이 <span id="depthVal">0</span> m</div>
  <div class="dist" id="distBox">충격파 — m</div>
</div>

<div id="countdown" class="hidden">
  <div class="lbl">운석 충돌까지</div>
  <div class="num" id="cdNum">6</div>
</div>

<div id="flash"></div>

<div class="overlay" id="titleScreen">
  <h1>두더지: 운석의 날</h1>
  <div class="sub">하늘에서 운석이 떨어진다.<br>위로 도망칠 곳은 없다.<br>더 깊이, 더 어둠 속으로 파고들어 살아남아라.</div>
  <div class="go" id="startBtn">▶ 좌 · 우 로 굴착 시작</div>
  <div class="small">← → 또는 A / D · 화면 좌/우 터치 · R 재시작</div>
</div>

<div class="overlay hidden" id="endScreen"></div>

<div id="hint">← 왼쪽 아래로 · → 오른쪽 아래로 &nbsp;|&nbsp; 균열로 드러난 흙(밝음)/암반(어둠)을 보고 베팅하라</div>

<script type="importmap">
{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
import * as THREE from 'three';

// ════════════════════════════════════════════════════════════════════
//  상수 / 튜닝 값
// ════════════════════════════════════════════════════════════════════
const COLS   = 20;        // 가로 칸 수
const TOTAL  = 100;      // 총 깊이(행)
const TW     = 1.0;      // 타일 가로
const TH     = 0.82;     // 타일 세로(행 간격)
const TD     = 0.7;      // 타일 두께(z)
const SOFT = 0, HARD = 1;

const PRE_TIME   = 6;    // 충돌 전 굴착 유예(초)
const THREAT_BASE = 0.011;  // 충격파 기본 속도(행/프레임@60)
const THREAT_RAMP = 0.024;  // 깊이에 따른 가속

// 색
const C_SOFT   = 0x8a5a22;
const C_CRACK  = 0x5c3a14;
const C_HARD   = 0x2b2836;
const C_HINT_S = 0xd89a4a;  // 균열 힌트: 흙
const C_HINT_H = 0x14121e;  // 균열 힌트: 암반
const C_FOG    = 0x050302;

// ════════════════════════════════════════════════════════════════════
//  Three 기본 셋업
// ════════════════════════════════════════════════════════════════════
const app = document.getElementById('app');
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;
app.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(C_FOG);
scene.fog = new THREE.FogExp2(C_FOG, 0.05);

const camera = new THREE.PerspectiveCamera(52, innerWidth / innerHeight, 0.1, 100);
camera.position.set(0, 0, 9);

// 빛은 오직 두더지 등불과 충격파에서만 — 그 밖의 블록은 어둠에 잠긴다
const moleLight = new THREE.PointLight(0xffd2a0, 7, 9, 1.5);
scene.add(moleLight);

// 충격파 광
const shockLight = new THREE.PointLight(0xff4010, 0, 14, 1.5);
scene.add(shockLight);

addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// ════════════════════════════════════════════════════════════════════
//  좌표 / 그리드 헬퍼
// ════════════════════════════════════════════════════════════════════
function worldX(r, c) { return c * TW + (r % 2 ? TW / 2 : 0); }
function worldY(r)    { return -r * TH; }

// 오프셋 브릭 구조의 아래 두 자식
function getChildren(r, c) {
  const n = r + 1;
  if (n >= TOTAL) return [];
  const out = [];
  if (r % 2 === 0) {            // 짝수행 → 홀수행
    if (c - 1 >= 0)   out.push({ r: n, c: c - 1, dir: 'left'  });
    if (c < COLS)     out.push({ r: n, c: c,     dir: 'right' });
  } else {                      // 홀수행 → 짝수행
    out.push({ r: n, c: c, dir: 'left' });
    if (c + 1 < COLS) out.push({ r: n, c: c + 1, dir: 'right' });
  }
  return out;
}

// ════════════════════════════════════════════════════════════════════
//  공유 지오메트리 / 머티리얼
// ════════════════════════════════════════════════════════════════════
const tileGeo  = new THREE.BoxGeometry(TW, TH, TD);
const matBlack = new THREE.MeshBasicMaterial({ color: 0x130e0a });   // 어둠 속 블록: 배경보다 아주 살짝만 밝게(구조만 어렴풋이)
// 드러난 블록은 자체발광 → 카메라 거리·빛과 무관하게 '원래 색'이 또렷이 보인다
const matSoft  = new THREE.MeshStandardMaterial({ color: C_SOFT,  roughness: 0.95, emissive: C_SOFT,   emissiveIntensity: 0.85, fog: false });
const matCrack = new THREE.MeshStandardMaterial({ color: C_CRACK, roughness: 1.0,  emissive: C_CRACK,  emissiveIntensity: 0.9,  fog: false });
const matHard  = new THREE.MeshStandardMaterial({ color: C_HARD,  roughness: 0.5,  emissive: 0x39354e, emissiveIntensity: 0.95, fog: false });

// ════════════════════════════════════════════════════════════════════
//  게임 상태
// ════════════════════════════════════════════════════════════════════
let grid, player, threat, state, preTimer, impactDone, maxDepth, shake;
const tiles = new Map();   // "r,c" -> mesh

function buildGrid() {
  grid = [];
  for (let r = 0; r < TOTAL; r++) {
    grid[r] = [];
    const hardChance = 0.18 + (r / TOTAL) * 0.30;
    for (let c = 0; c < COLS; c++)
      grid[r][c] = { type: Math.random() < hardChance ? HARD : SOFT, hits: 0, dug: false, flash: 0, seen: false };
  }
  // 보장된 굴착 경로를 위→아래로 새겨 클리어 가능성 확보(막다른 길은 균열로 회피 가능)
  let pr = 0, pc = Math.floor(COLS / 2);
  grid[0][pc] = { type: SOFT, hits: 2, dug: true, flash: 0, seen: true };
  player = { r: 0, c: pc };
  while (pr < TOTAL - 1) {
    const kids = getChildren(pr, pc);
    const k = kids[(Math.random() * kids.length) | 0];
    grid[k.r][k.c].type = SOFT;
    pr = k.r; pc = k.c;
  }
  // 가로 3연속 암반 금지(최대 2연속) — 세 번째를 흙으로
  for (let r = 0; r < TOTAL; r++) {
    let run = 0;
    for (let c = 0; c < COLS; c++) {
      if (grid[r][c].type === HARD) { if (++run >= 3) { grid[r][c].type = SOFT; run = 0; } }
      else run = 0;
    }
  }
  // 회피 불가능한 막다른 길(깊은 함정) 제거 → 남는 막다른 길은 균열 한 번이면 보이는 형태뿐
  for (let i = 0; i < 8 && eliminateDeepTraps(); i++) {}
}

// 바닥 도달 가능(safe) 타일을 역방향 DP로 구하고, 비-safe인데 soft 자식이 있는
// '깊은 함정'을 암반으로 바꾼다. (변경이 있었으면 true → 연쇄 함정까지 반복 처리)
function eliminateDeepTraps() {
  const safe = Array.from({ length: TOTAL }, () => new Array(COLS).fill(false));
  for (let r = TOTAL - 1; r >= 0; r--)
    for (let c = 0; c < COLS; c++) {
      if (grid[r][c].type !== SOFT) continue;
      if (r >= TOTAL - 2) { safe[r][c] = true; continue; }   // 승리 깊이 도달 = safe
      safe[r][c] = getChildren(r, c).some(k => safe[k.r][k.c]);
    }
  let changed = false;
  for (let r = 0; r < TOTAL; r++)
    for (let c = 0; c < COLS; c++)
      if (grid[r][c].type === SOFT && !safe[r][c] &&
          getChildren(r, c).some(k => grid[k.r][k.c].type === SOFT)) {
        grid[r][c].type = HARD; changed = true;
      }
  return changed;
}

function resetGame() {
  for (const o of tiles.values()) { scene.remove(o); }
  tiles.clear();
  buildGrid();
  threat = { row: -100 };       // 비활성(화면 밖)
  state = 'title';
  preTimer = PRE_TIME;
  impactDone = false;
  maxDepth = 0;
  shake = 0;
}

// ════════════════════════════════════════════════════════════════════
//  두더지 메시
// ════════════════════════════════════════════════════════════════════
const mole = new THREE.Group();
{
  const body = new THREE.Mesh(
    new THREE.SphereGeometry(0.34, 24, 18),
    new THREE.MeshStandardMaterial({ color: 0xc8a060, roughness: 0.7, emissive: 0x3a2a12, emissiveIntensity: 0.6 })
  );
  body.scale.set(1.15, 0.92, 1);
  mole.add(body);
  const noseMat = new THREE.MeshStandardMaterial({ color: 0xff9b9b, roughness: 0.6 });
  const nose = new THREE.Mesh(new THREE.SphereGeometry(0.09, 10, 8), noseMat);
  nose.position.set(0, -0.04, 0.34); mole.add(nose);
  const eyeGeo = new THREE.SphereGeometry(0.045, 8, 6);
  const eyeMat = new THREE.MeshStandardMaterial({ color: 0x120c08 });
  for (const sx of [-0.13, 0.13]) {
    const e = new THREE.Mesh(eyeGeo, eyeMat); e.position.set(sx, 0.06, 0.3); mole.add(e);
  }
  // 발톱
  const clawMat = new THREE.MeshStandardMaterial({ color: 0xe8ddc8, roughness: 0.5 });
  for (const sx of [-0.2, -0.07, 0.07, 0.2]) {
    const claw = new THREE.Mesh(new THREE.ConeGeometry(0.035, 0.16, 6), clawMat);
    claw.position.set(sx, -0.28, 0.26); claw.rotation.x = Math.PI; mole.add(claw);
  }
}
mole.position.z = 0.45;
scene.add(mole);

// ════════════════════════════════════════════════════════════════════
//  충격파 메시(글로우 바 + 파티클)
// ════════════════════════════════════════════════════════════════════
const shock = new THREE.Group();
const shockW = COLS * TW + 8;
{
  const bar = new THREE.Mesh(
    new THREE.PlaneGeometry(shockW, TH * 0.7),
    new THREE.MeshBasicMaterial({ color: 0xff6010, transparent: true, opacity: 0.95, fog: false })
  );
  shock.add(bar);
  const glow = new THREE.Mesh(
    new THREE.PlaneGeometry(shockW, TH * 5),
    new THREE.MeshBasicMaterial({ color: 0xff3000, transparent: true, opacity: 0.22,
      blending: THREE.AdditiveBlending, depthWrite: false, fog: false })
  );
  glow.position.y = TH * 2;     // 위쪽으로 번지는 화염
  shock.add(glow);
  const core = new THREE.Mesh(
    new THREE.PlaneGeometry(shockW, 0.06),
    new THREE.MeshBasicMaterial({ color: 0xfff0a0, fog: false })
  );
  core.position.y = -TH * 0.1;
  shock.add(core);
}
shock.position.z = 0.9;
shock.visible = false;
scene.add(shock);

// 떨어지는 불티 파티클
const PCOUNT = 90;
const pPos = new Float32Array(PCOUNT * 3);
const pVel = [];
for (let i = 0; i < PCOUNT; i++) {
  pPos[i*3] = (Math.random() - 0.5) * shockW;
  pPos[i*3+1] = Math.random() * TH * 3;
  pPos[i*3+2] = (Math.random() - 0.5) * 0.5;
  pVel.push(0.02 + Math.random() * 0.05);
}
const pGeo = new THREE.BufferGeometry();
pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
const particles = new THREE.Points(pGeo, new THREE.PointsMaterial({
  color: 0xffb040, size: 0.12, transparent: true, opacity: 0.9,
  blending: THREE.AdditiveBlending, depthWrite: false, fog: false
}));
particles.visible = false;
shock.add(particles);

// ════════════════════════════════════════════════════════════════════
//  타일 메시 풀
// ════════════════════════════════════════════════════════════════════
function makeTile(r, c) {
  const m = new THREE.Mesh(tileGeo, matBlack);
  m.position.set(worldX(r, c), worldY(r), 0);
  return m;
}

// 가시 판정: 균열로 드러났거나(영구) 두더지 주변 반경 안이면 보인다
// 반경은 고정 — 시야 개방은 오직 운석 충격파가 담당한다
const revealR2 = 1.6 * 1.6;
function visible(r, c) {
  if (grid[r][c].seen) return true;
  if (impactDone && r <= threat.row + 10) return true;  // 충격파 인근은 빛을 받아 원래 색 복원
  const dx = worldX(r, c) - mole.position.x;
  const dy = worldY(r)    - mole.position.y;
  return dx * dx + dy * dy <= revealR2;
}

function refreshTile(m, r, c) {
  const t = grid[r][c];
  if (!visible(r, c)) { m.material = matBlack; return; }   // 어둠에 잠긴 블록

  let mat = t.type === HARD ? matHard : (t.hits === 1 ? matCrack : matSoft);
  if (t.flash > 0) {                                        // 암반 충돌 플래시
    mat = mat.clone();
    mat.emissive = new THREE.Color(0xff3000);
    mat.emissiveIntensity = 0.5 + (t.flash / 8) * 1.0;
  }
  m.material = mat;
}

function syncTiles() {
  const r0 = Math.max(0, Math.floor(player.r) - 6);
  const r1 = Math.min(TOTAL, Math.floor(player.r) + 15);
  for (const [key, m] of tiles) {
    const [r, c] = key.split(',').map(Number);
    if (r < r0 || r >= r1 || grid[r][c].dug) { scene.remove(m); tiles.delete(key); }
  }
  for (let r = r0; r < r1; r++) for (let c = 0; c < COLS; c++) {
    if (grid[r][c].dug) continue;
    const key = r + ',' + c;
    let m = tiles.get(key);
    if (!m) { m = makeTile(r, c); scene.add(m); tiles.set(key, m); }
    refreshTile(m, r, c);
  }
}

// ════════════════════════════════════════════════════════════════════
//  입력
// ════════════════════════════════════════════════════════════════════
function tryMove(dir) {
  if (state !== 'play') return;
  const ch = getChildren(player.r, player.c).find(t => t.dir === dir);
  if (!ch) return;
  const t = grid[ch.r][ch.c];
  if (t.type === HARD) { t.flash = 8; shake = Math.max(shake, 0.10); audio.bonk(); return; }
  t.hits++;
  if (t.hits === 1) {                                    // 균열 → 그 아래 두 칸이 '원래 색'으로 드러남
    audio.crack();
    for (const k of getChildren(ch.r, ch.c)) grid[k.r][k.c].seen = true;
  }
  if (t.hits >= 2) {
    grid[ch.r][ch.c].dug = true;
    player.r = ch.r; player.c = ch.c;
    maxDepth = Math.max(maxDepth, player.r);
    audio.dig();
  }
}

function onInput(dir) {
  if (state === 'title') { startGame(); return; }
  if (state === 'win' || state === 'lose') { startGame(); return; }
  tryMove(dir);
}

addEventListener('keydown', e => {
  if (e.repeat) return;
  if (e.key === 'ArrowLeft'  || e.key === 'a' || e.key === 'A') onInput('left');
  else if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') onInput('right');
  else if (e.key === 'r' || e.key === 'R') { resetGame(); startGame(); }
  else if (e.key === ' ' || e.key === 'Enter') { if (state !== 'play') onInput('left'); }
});
const bind = (id, dir) => document.getElementById(id)
  .addEventListener('pointerdown', e => { e.preventDefault(); onInput(dir); });
bind('zoneL', 'left'); bind('zoneR', 'right');
document.getElementById('startBtn').addEventListener('pointerdown', e => { e.preventDefault(); onInput('left'); });

// ════════════════════════════════════════════════════════════════════
//  오디오 (Web Audio, 절차적)
// ════════════════════════════════════════════════════════════════════
const audio = (() => {
  let ctx = null, master = null;
  const init = () => {
    if (ctx) return;
    ctx = new (window.AudioContext || window.webkitAudioContext)();
    master = ctx.createGain(); master.gain.value = 0.7; master.connect(ctx.destination);
  };
  const tone = (freq, dur, type, vol, slideTo) => {
    if (!ctx) return;
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.type = type; o.frequency.setValueAtTime(freq, ctx.currentTime);
    if (slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, ctx.currentTime + dur);
    g.gain.setValueAtTime(vol, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + dur);
    o.connect(g); g.connect(master); o.start(); o.stop(ctx.currentTime + dur);
  };
  const noise = (dur, vol, lpFreq) => {
    if (!ctx) return;
    const n = Math.floor(ctx.sampleRate * dur);
    const buf = ctx.createBuffer(1, n, ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < n; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / n);
    const src = ctx.createBufferSource(); src.buffer = buf;
    const lp = ctx.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = lpFreq;
    const g = ctx.createGain(); g.gain.value = vol;
    src.connect(lp); lp.connect(g); g.connect(master); src.start();
  };
  return {
    resume: () => { init(); if (ctx.state === 'suspended') ctx.resume(); },
    dig:   () => noise(0.12, 0.35, 900),
    crack: () => tone(420, 0.10, 'square', 0.10, 260),
    bonk:  () => { tone(90, 0.16, 'sine', 0.28, 55); noise(0.08, 0.18, 300); },
    boom:  () => { tone(70, 1.4, 'sine', 0.6, 32); noise(1.2, 0.5, 400); },
    thump: () => tone(56, 0.16, 'sine', 0.5, 40),
    win:   () => [0,4,7,12].forEach((s,i) => setTimeout(() => tone(330*Math.pow(2,s/12), 0.5, 'triangle', 0.22), i*160)),
  };
})();

// ════════════════════════════════════════════════════════════════════
//  게임 진행
// ════════════════════════════════════════════════════════════════════
const elTitle = document.getElementById('titleScreen');
const elEnd   = document.getElementById('endScreen');
const elFlash = document.getElementById('flash');
const elCd    = document.getElementById('countdown');
const elCdNum = document.getElementById('cdNum');
const elDepth = document.getElementById('depthVal');
const elDist  = document.getElementById('distBox');

function startGame() {
  if (state === 'win' || state === 'lose') resetGame();
  audio.resume();
  state = 'play';
  preTimer = PRE_TIME;
  impactDone = false;
  elTitle.classList.add('hidden');
  elEnd.classList.add('hidden');
}

function impact() {
  impactDone = true;
  threat.row = -2;
  shake = 0.6;
  shock.visible = true; particles.visible = true;
  audio.boom();
  elCd.classList.add('hidden');
  elFlash.style.opacity = '1';
  requestAnimationFrame(() => { elFlash.style.opacity = '0'; });
}

function endGame(won) {
  state = won ? 'win' : 'lose';
  if (won) audio.win();
  elEnd.classList.remove('hidden');
  elEnd.innerHTML = won
    ? `<h1>살아남았다</h1>
       <div class="epi">
         운석이 지상을 불태웠다.<br>
         그러나 당신은 깊은 어둠 속에서 숨을 죽였다.<br><br>
         <span class="em">— 수백만 년 후 —</span><br>
         당신의 후손들이 이 땅에 번성한다.
       </div>
       <div class="go">다시 플레이</div>
       <div class="small">R · 화면 터치 · 좌우 키</div>`
    : `<h1 class="lose">충격파에 삼켜졌다</h1>
       <div class="sub">도달 깊이 <b style="color:#e6c074">${maxDepth} m</b></div>
       <div class="go">다시 도전</div>
       <div class="small">R · 화면 터치 · 좌우 키</div>`;
}

// ════════════════════════════════════════════════════════════════════
//  업데이트 루프
// ════════════════════════════════════════════════════════════════════
let hbTimer = 0;
const clock = new THREE.Clock();

function update(dt) {
  // 플래시 타이머 감소
  const r0 = Math.max(0, Math.floor(player.r) - 6);
  const r1 = Math.min(TOTAL, Math.floor(player.r) + 15);
  for (let r = r0; r < r1; r++) for (let c = 0; c < COLS; c++)
    if (grid[r][c].flash > 0) grid[r][c].flash--;

  if (state === 'play') {
    if (!impactDone) {
      preTimer -= dt;
      elCd.classList.remove('hidden');
      elCdNum.textContent = Math.max(0, Math.ceil(preTimer));
      if (preTimer <= 0) impact();
    } else {
      const f = dt * 60;   // 프레임 보정
      const speed = THREAT_BASE + (maxDepth / TOTAL) * THREAT_RAMP;
      threat.row += speed * f;
      // 충격파가 지나간 타일 소멸
      for (let r = r0; r < Math.min(TOTAL, Math.ceil(threat.row) + 1); r++)
        for (let c = 0; c < COLS; c++) grid[r][c].dug = true;

      if (threat.row >= player.r) { endGame(false); }
    }
    if (player.r >= TOTAL - 2) { endGame(true); }
  }

  // ── 위협 근접 → 흔들림 / 심장박동 ──
  let danger = 0;
  if (impactDone && state === 'play') {
    const gap = player.r - threat.row;
    danger = Math.max(0, Math.min(1, (7 - gap) / 7));
    shake = Math.max(shake, danger * 0.18);
  }
  hbTimer -= dt;
  if (hbTimer <= 0 && state === 'play') {
    audio.thump();
    setTimeout(() => audio.thump(), 150);
    hbTimer = 1.15 - 0.8 * Math.min(1, 0.3 + danger);
  }

  // ── 두더지 위치 ──
  mole.position.x = worldX(player.r, player.c);
  mole.position.y = worldY(player.r);
  moleLight.position.set(mole.position.x, mole.position.y, 1.5);

  // ── 충격파 위치 / 파티클 ──
  if (shock.visible) {
    shock.position.x = mole.position.x;
    shock.position.y = worldY(threat.row);
    shockLight.position.set(mole.position.x, worldY(threat.row), 1.5);
    shockLight.intensity = 6 + 18 * danger;
    const arr = particles.geometry.attributes.position.array;
    for (let i = 0; i < PCOUNT; i++) {
      arr[i*3+1] -= pVel[i] * 60 * dt;
      if (arr[i*3+1] < -TH) { arr[i*3+1] = TH * 3; arr[i*3] = (Math.random()-0.5)*shockW; }
    }
    particles.geometry.attributes.position.needsUpdate = true;
  }

  // ── 카메라 추적(스무딩) + 흔들림 ──
  const tx = mole.position.x, ty = mole.position.y + 0.3;
  camera.position.x += (tx - camera.position.x) * Math.min(1, dt * 8);
  camera.position.y += (ty - camera.position.y) * Math.min(1, dt * 8);
  if (shake > 0.001) {
    camera.position.x += (Math.random() - 0.5) * shake;
    camera.position.y += (Math.random() - 0.5) * shake;
    shake *= 0.86;
  }
  camera.lookAt(mole.position.x, mole.position.y - 1.6, 0);

  syncTiles();

  // ── HUD ──
  elDepth.textContent = Math.floor(player.r);
  if (impactDone && state === 'play') {
    const gap = Math.max(0, player.r - threat.row);
    elDist.textContent = `충격파 ↑ ${gap.toFixed(1)} m`;
    elDist.classList.toggle('danger', gap < 4);
  } else {
    elDist.textContent = '';
    elDist.classList.remove('danger');
  }
}

function loop() {
  const dt = Math.min(0.05, clock.getDelta());
  update(dt);
  renderer.render(scene, camera);
  requestAnimationFrame(loop);
}

// ════════════════════════════════════════════════════════════════════
resetGame();
loop();
</script>
</body>
